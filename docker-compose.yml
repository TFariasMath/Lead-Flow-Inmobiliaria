version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: leadflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: leadflow
      POSTGRES_USER: leadflow_user
      POSTGRES_PASSWORD: leadflow_secret_2024
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
